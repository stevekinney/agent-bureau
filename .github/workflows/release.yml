name: Release

# Main-branch release coordinator. Two modes, both via changesets/action:
#   - version-PR mode: when unreleased changesets exist on main, opens/updates the
#     "Version Packages" pull request (bumps versions + changelogs). Does NOT publish.
#   - publish mode: when that PR has merged (version commit on main, no changesets left),
#     runs `bun run release`, which publishes only not-yet-published versions with provenance.
#
# This workflow file name (`release.yml`) is what you register as the trusted publisher in each
# package's npm settings (org: stevekinney, repo: agent-bureau, workflow: release.yml). Changing
# the file name means re-registering the trusted publisher on npm.

on:
  push:
    branches:
      - main

# Avoid overlapping release runs racing on the registry / Version PR.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the Version Packages PR / push the version commit
  pull-requests: write # open/update the Version Packages PR
  id-token: write # MANDATORY: mint the OIDC token for npm trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # changesets needs full history to compute what changed

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.14.0 # >= 22.14 required by npm trusted publishing
          registry-url: https://registry.npmjs.org

      - name: Pin npm to a trusted-publishing-capable version
        # setup-node's bundled npm can lag; ^11 keeps us >= 11.5.1 without release-day surprises.
        # (scripts/release.ts also asserts the version before touching the registry.)
        run: |
          npm install -g npm@^11
          node --version
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate changesets target publishable packages
        run: bun run check-changesets

      - name: Build publishable packages
        run: bun run turbo run build --filter=armorer --filter=conversationalist

      - name: Create Version Packages PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — its presence can suppress OIDC. Trusted publishing uses the id-token above.
          # Publishing is opt-in: scripts/release.ts no-ops unless RELEASE_ENABLED is "true". Set the
          # `RELEASE_ENABLED` repository variable to `true` once the npm trusted publishers are
          # registered (see RELEASING.md). Until then, merges land the pipeline without publishing.
          RELEASE_ENABLED: ${{ vars.RELEASE_ENABLED }}
